<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141923" />
      <stop offset="100%" stop-color="#080A0F" />
    </radialGradient>
    
    <!-- Neon Teal-Blue Accent Gradient -->
    <linearGradient id="neonCyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Neon Pink-Red Accent Gradient -->
    <linearGradient id="neonPinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E62" />
      <stop offset="100%" stop-color="#FF9966" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Cosmic Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <g transform="translate(100, 100)">
    <!-- Stylized Outer Ring Hexagon -->
    <polygon points="300,50 516,175 516,425 300,550 84,425 84,175" 
             fill="none" stroke="url(#neonCyanGrad)" stroke-width="12" opacity="0.3" />

    <!-- Outer Ring Glowing Accents -->
    <polygon points="300,50 516,175 516,425" 
             fill="none" stroke="url(#neonCyanGrad)" stroke-width="12" filter="url(#neonGlow)" />
             
    <polygon points="300,550 84,425 84,175" 
             fill="none" stroke="url(#neonPinkGrad)" stroke-width="12" filter="url(#neonGlow)" />

    <!-- Core Stylized Monogram Lambda/A symbol -->
    <path d="M 300,120 L 440,400 L 370,400 L 300,260 L 230,400 L 160,400 Z" 
          fill="url(#neonCyanGrad)" filter="url(#neonGlow)" />
          
    <path d="M 210,340 L 390,340 L 370,300 L 230,300 Z" 
          fill="url(#neonPinkGrad)" filter="url(#neonGlow)" />
  </g>
</svg>
