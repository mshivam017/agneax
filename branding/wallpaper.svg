<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E14" />
      <stop offset="50%" stop-color="#0F131C" />
      <stop offset="100%" stop-color="#05070A" />
    </linearGradient>

    <!-- Radial blur glows -->
    <radialGradient id="cyanGlow" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="pinkGlow" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#FF5E62" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FF5E62" stop-opacity="0" />
    </radialGradient>

    <!-- Grid pattern overlay -->
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Base Dark Canvas -->
  <rect width="1920" height="1080" fill="url(#bgGrad)" />

  <!-- Ambient light glows -->
  <rect width="1920" height="1080" fill="url(#cyanGlow)" />
  <rect width="1920" height="1080" fill="url(#pinkGlow)" />

  <!-- Grid mesh texture -->
  <rect width="1920" height="1080" fill="url(#gridPattern)" />

  <!-- Decorative abstract vector lines -->
  <path d="M-200 900 C 400 700, 800 1100, 2120 700" fill="none" stroke="rgba(0, 242, 254, 0.08)" stroke-width="4" />
  <path d="M-200 950 C 420 750, 780 1050, 2120 650" fill="none" stroke="rgba(255, 94, 98, 0.06)" stroke-width="2" />
  
  <path d="M-200 200 C 600 400, 1200 100, 2120 300" fill="none" stroke="rgba(0, 242, 254, 0.05)" stroke-width="1.5" />
</svg>
