name: Build Agneax OS ISO

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/agneax-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/agneax-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Host Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            xorriso \
            squashfs-tools \
            mtools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub-efi-ia32-bin \
            cmake \
            build-essential \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev

      - name: Build Rust System Daemon (agneax-core)
        run: |
          cd packages/agneax-core
          cargo build --release

      - name: Run Rust Daemon Unit Tests
        run: |
          cd packages/agneax-core
          cargo test

      - name: Run Python Application Unit Tests
        run: |
          python tests/test_agneax.py

      - name: Compile C++ Window Helper
        run: |
          mkdir -p desktop/cpp_src/build
          cd desktop/cpp_src/build
          cmake ..
          make

      - name: Run ISO Builder Script
        run: |
          chmod +x scripts/build_iso.sh
          sudo ./scripts/build_iso.sh
          sudo chown -R $USER:$USER build

      - name: Verify ISO Boot in QEMU (Headless)
        run: |
          sudo apt-get install -y qemu-system-x86
          # Boot headless for 15 seconds to ensure no bootloader crashes (Step 8 of Gap Analysis)
          qemu-system-x86_64 -m 2048 -cdrom build/agneax-os-amd64.iso -display none -daemonize
          sleep 15
          # Check if qemu process is still running
          if pgrep qemu-system-x86; then
            echo "ISO successfully booted in headless QEMU!"
            pkill qemu-system-x86
          else
            echo "Error: QEMU crashed during boot!"
            exit 1
          fi

      - name: Generate SHA256 Checksum
        run: |
          cd build
          sha256sum agneax-os-amd64.iso > sha256sum.txt
          echo "ISO checksum generated:"
          cat sha256sum.txt

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgneaxOS-ISO
          path: build/agneax-os-amd64.iso

      - name: Upload Checksum Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgneaxOS-Checksum
          path: build/sha256sum.txt

      - name: Create GitHub Release (Tags Only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/agneax-os-amd64.iso
            build/sha256sum.txt
          body: |
            # Agneax OS Release `${{ github.ref_name }}`
            
            Welcome to the new release of Agneax OS!
            
            ## Features
            - Custom Wayland desktop environment (Agneax Desktop)
            - High-performance Rust-based system daemon
            - C++ window compositor layout calculations
            - Beautiful glassmorphic styling
            
            ## Files
            - `agneax-os-amd64.iso`: The bootable installer and live environment ISO.
            - `sha256sum.txt`: Verification hash file.
            
            **SHA256 Checksum:**
            ```
            $(cat build/sha256sum.txt)
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
